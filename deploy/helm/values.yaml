replicaCount: 1
image:
  repository: codevulnerableanalyzer
  tag: "2.0.0"
  pullPolicy: IfNotPresent
service:
  port: 8765
resources:
  requests: {cpu: 100m, memory: 128Mi}
  limits: {cpu: 1000m, memory: 512Mi}
securityContext:
  runAsNonRoot: true
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
